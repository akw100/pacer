<?xml version="1.0" encoding="UTF-8"?>
<!-- Open Graph / link-preview share card (1200x630). Rendered to og-image.png
     by generate.sh. Brand colors mirror theme/tokens.css. Uses a system font
     stack because the Quick Look renderer has no web fonts. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF5A36"/>
      <stop offset="1" stop-color="#F2470F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Pace waves, bottom-right flourish -->
  <g stroke="#FAF8F5" stroke-opacity="0.18" stroke-width="14" stroke-linecap="round" fill="none">
    <path d="M 760 520 a 220 220 0 0 1 360 0"/>
    <path d="M 820 560 a 150 150 0 0 1 240 0"/>
    <path d="M 880 598 a 80 80 0 0 1 120 0"/>
  </g>

  <!-- App icon tile -->
  <svg x="96" y="205" width="220" height="220" viewBox="0 0 512 512">
    <rect width="512" height="512" rx="112" fill="#FAF8F5"/>
    <path d="M170 350 L170 162 C170 144 184 130 202 130 L262 130 C310 130 348 168 348 216 C348 264 310 302 262 302 L222 302" stroke="#FF5A36" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="222" cy="382" r="22" fill="#FF5A36"/>
  </svg>

  <!-- Wordmark + tagline -->
  <text x="368" y="300" font-size="132" font-weight="800" letter-spacing="-3" fill="#FAF8F5">Pacer</text>
  <text x="372" y="372" font-size="36" font-weight="500" fill="#FAF8F5" fill-opacity="0.92">Track runs, workouts &amp; habits —</text>
  <text x="372" y="420" font-size="36" font-weight="500" fill="#FAF8F5" fill-opacity="0.92">and compete with your family.</text>
</svg>
