<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Pacer — offline</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,500,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --surface: #faf8f5;
        --ink: #1f2733;
        --ink-muted: #8a93a2;
        --accent: #ff5a36;
        --border: #e8e4df;
        --radius: 16px;
        --display: 'Cabinet Grotesk', system-ui, sans-serif;
        --body: 'Inter', system-ui, sans-serif;
      }
      html, body { margin: 0; padding: 0; height: 100%; background: var(--surface); color: var(--ink); font-family: var(--body); }
      .wrap { min-height: 100%; display: grid; place-items: center; padding: 24px; }
      .card { width: 100%; max-width: 360px; padding: 24px; border: 1px solid var(--border); border-radius: var(--radius); text-align: center; background: var(--surface); }
      .icon { display: inline-grid; place-items: center; width: 48px; height: 48px; border-radius: 999px; background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); margin-bottom: 12px; }
      h1 { font-family: var(--display); font-size: 22px; font-weight: 700; margin: 0 0 6px; }
      p { font-size: 14px; line-height: 1.5; color: var(--ink-muted); margin: 0 0 16px; }
      button { font-family: var(--body); font-size: 13px; font-weight: 600; color: #fff; background: var(--accent); border: none; border-radius: 999px; padding: 10px 18px; cursor: pointer; }
      svg { width: 22px; height: 22px; stroke-width: 1.8; fill: none; stroke: currentColor; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M2 8.82a15 15 0 0 1 20 0M5 12.86a10 10 0 0 1 14 0M8.5 16.43a5 5 0 0 1 7 0"/><line x1="12" y1="20" x2="12" y2="20"/></svg>
        </span>
        <h1>You're offline</h1>
        <p>Pacer is waiting for the network to come back. Your last view stays right here.</p>
        <button onclick="location.reload()">Try again</button>
      </div>
    </div>
  </body>
</html>
